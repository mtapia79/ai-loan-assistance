# Alembic Configuration File
# This file is used by the alembic command line tool.

# ============================================================
# Main Alembic Configuration
# ============================================================

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(asctime)s_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the "create date" field.  Set to string 'local' to
# use the system local timezone.
# optional bool
sqlalchemy.timezone =

# max length of characters to apply to the
# "slug" field
# set to 40 to truncate the
# "slug" field to 40 chars
# sqlalchemy.max_identifier_length = 63

sqlalchemy.url = ******localhost/loan_assistance

# ============================================================
# Logging Configuration
# ============================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

