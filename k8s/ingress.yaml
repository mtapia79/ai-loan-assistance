apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loan-assistance-ingress
  namespace: loan-assistance
  labels:
    app.kubernetes.io/name: loan-assistance
    app.kubernetes.io/component: ingress
  annotations:
    # AWS ALB Ingress Controller
    kubernetes.io/ingress.class: "alb"
    alb.ingress.kubernetes.io/scheme: "internet-facing"
    alb.ingress.kubernetes.io/target-type: "ip"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    # AWS ACM certificate ARN
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:REGION:ACCOUNT:certificate/CERT_ID"
    # Rate limiting
    alb.ingress.kubernetes.io/wafv2-acl-arn: "arn:aws:wafv2:REGION:ACCOUNT:REGION/webacl/WEBACL_ID"
spec:
  rules:
    - host: loan-assistance.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loan-assistance-service
                port:
                  number: 80
