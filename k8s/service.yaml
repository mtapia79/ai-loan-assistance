apiVersion: v1
kind: Service
metadata:
  name: loan-assistance-service
  namespace: loan-assistance
  labels:
    app.kubernetes.io/name: loan-assistance
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loan-assistance
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loan-assistance-hpa
  namespace: loan-assistance
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loan-assistance-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
