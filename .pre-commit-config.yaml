# ============================================================
# Pre-commit hooks configuration
# Install with: pre-commit install
# Run manually: pre-commit run --all-files
# ============================================================

repos:
  # YAML formatting
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-toml

  # Python code formatting (Black)
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3.12

  # Python linting (Ruff)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Type checking (mypy)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-python-jose
          - types-redis
        args: ["--ignore-missing-imports"]
        exclude: tests/

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ["-ll", "-i"]
        exclude: tests/

  # JSON validation
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-json
      - id: check-xml
      - id: check-yaml

  # Dockerfile linting
  - repo: https://github.com/hadialqattan/Dockerfile_linter
    rev: v3.0.1
    hooks:
      - id: dockerfile-lint
        args: [--ignore, "DL3006,DL3008,DL3009"]

ci:
  autofix_commit_msg: "chore: auto fixes from pre-commit hooks\n\nfor more information, see https://pre-commit.ci"
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
